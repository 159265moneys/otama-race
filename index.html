<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex, nofollow" />
<title>オタマレース ― 手触りデモ v4（障害物・敵）</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:100%; height:100%; overflow:hidden; background:#15030f; font-family: system-ui, -apple-system, sans-serif; }
  #app { position:fixed; inset:0; }
  canvas { display:block; cursor:crosshair; }

  #panel {
    position:fixed; top:12px; left:12px; z-index:10;
    width:286px; max-height:calc(100% - 24px); overflow-y:auto;
    background:rgba(22,5,17,0.84); backdrop-filter:blur(8px);
    border:1px solid rgba(255,150,190,0.25); border-radius:14px;
    padding:14px 14px 16px; color:#ffd9e6; font-size:12px;
  }
  #panel h1 { font-size:13px; letter-spacing:.03em; margin-bottom:4px; color:#ff9ec4; }
  #panel .sub { font-size:10.5px; color:#c98aa6; margin-bottom:10px; line-height:1.55; }
  .row { margin:8px 0; }
  .row label { display:flex; justify-content:space-between; margin-bottom:3px; color:#ffc2d8; }
  .row label .val { color:#fff; font-variant-numeric:tabular-nums; }
  .row input[type=range]{ width:100%; accent-color:#ff5e9a; height:16px; }
  .star { color:#ffd54a; }
  .btns { display:flex; gap:8px; margin-top:12px; }
  .btns button {
    flex:1; padding:7px; border:none; border-radius:9px; cursor:pointer;
    background:#ff4f93; color:#fff; font-weight:600; font-size:12px;
  }
  .btns button.sec { background:rgba(255,255,255,0.12); color:#ffd9e6; }

  #hud {
    position:fixed; top:12px; right:12px; z-index:10; text-align:right;
    color:#ffe3ee; font-size:12px; text-shadow:0 1px 4px #000; pointer-events:none;
  }
  #hud .big { font-size:24px; font-weight:800; color:#fff; line-height:1.1; }
  #hud .lab { font-size:10px; color:#e9a9c4; letter-spacing:.08em; }
  #hud .knock { color:#ff5e5e; font-weight:800; display:none; }

  #help {
    position:fixed; bottom:12px; left:50%; transform:translateX(-50%); z-index:10;
    color:#ffd9e6; font-size:12px; background:rgba(22,5,17,0.72);
    padding:7px 16px; border-radius:20px; text-shadow:0 1px 2px #000; white-space:nowrap;
  }
  #help b{ color:#ff9ec4; }

  #lockhint {
    position:fixed; inset:0; z-index:15; display:flex; align-items:center; justify-content:center;
    pointer-events:none; color:#fff; font-size:18px; font-weight:700;
    text-shadow:0 2px 12px #000; background:rgba(15,3,11,0.25);
  }
  #lockhint span { background:rgba(255,79,147,0.85); padding:10px 22px; border-radius:24px; }

  #charge {
    position:fixed; bottom:52px; left:50%; transform:translateX(-50%); z-index:10;
    width:160px; height:8px; border-radius:5px; background:rgba(255,255,255,0.15);
    overflow:hidden; display:none;
  }
  #charge > div { height:100%; width:0%; background:linear-gradient(90deg,#ffd54a,#ff4f93); }

  #banner {
    position:fixed; inset:0; z-index:20; display:none;
    align-items:center; justify-content:center; flex-direction:column;
    background:rgba(15,3,11,0.55); color:#fff; text-align:center;
  }
  #banner .t { font-size:46px; font-weight:800; color:#ffd54a; text-shadow:0 2px 24px #ff5e9a; }
  #banner .s { margin-top:8px; font-size:15px; color:#ffd9e6; }
  #banner button{ margin-top:20px; padding:10px 28px; border:none; border-radius:11px; cursor:pointer; background:#ff4f93; color:#fff; font-weight:700; font-size:14px; }
</style>
</head>
<body>
<div id="app"></div>

<div id="panel">
  <h1>オタマ手触りデモ v4（障害物・敵）</h1>
  <div class="sub">マウス＝視点（画面クリックでロック）、WASD＝移動。柱・振り子・白血球を避ける。ジャンプで飛び越え、Eで弾く。当たると逆方向に吹き飛ぶ。</div>
  <div id="sliders"></div>
  <div class="btns">
    <button id="resetBtn">リセット (R)</button>
    <button class="sec" id="hideBtn">隠す (H)</button>
  </div>
</div>

<div id="hud">
  <div class="lab">しんこう</div>
  <div class="big"><span id="dist">0</span><span style="font-size:13px"> m</span></div>
  <div class="lab" style="margin-top:6px">ゴールまで <span id="togo">0</span> m</div>
  <div class="lab">そくど <span id="spd">0.0</span></div>
  <div class="knock" id="knockLbl">ふっとび中！</div>
</div>

<div id="help">操作: <b>WASD</b> 移動 ／ <b>マウス</b> 視点 ／ <b>Space</b> ジャンプ ／ <b>Shift</b> ダッシュ ／ <b>E</b> 回転攻撃 ／ <b>R</b> リセット</div>
<div id="lockhint"><span>画面をクリックして視点操作を開始（Escで解除）</span></div>
<div id="charge"><div id="chargeFill"></div></div>

<div id="banner">
  <div class="t">受精成功</div>
  <div class="s"><span id="cleartime">0.0</span> 秒でゴール</div>
  <button id="againBtn">もう一回 (R)</button>
</div>

<script type="importmap">
{ "imports": { "three": "./three.module.js" } }
</script>
<script type="module">
import * as THREE from 'three';

// ============================================================
//  パラメータ（手触りの沼。全部スライダーで生調整できる）
// ============================================================
const P = {
  gravity:    { v:30,   min:5,   max:60,  step:1,    label:'重力' },
  bounceVel:  { v:8,    min:3,   max:20,  step:0.5,  label:'オート跳ねの高さ（真上）' },
  bounceWait: { v:0.04, min:0,   max:0.5, step:0.01, label:'跳ね間隔（着地後のタメ）' },
  fwdMax:     { v:12,   min:3,   max:30,  step:0.5,  label:'移動スピード', star:true },
  sway:       { v:3.5,  min:0,   max:12,  step:0.2,  label:'着地の左右ブレ', star:true },
  faceTurn:   { v:12,   min:3,   max:25,  step:1,    label:'向き直しの速さ' },
  jumpVel:    { v:15,   min:6,   max:30,  step:0.5,  label:'ジャンプの高さ（真上）' },
  chargeMax:  { v:2.2,  min:1,   max:4,   step:0.1,  label:'最大タメ倍率' },
  chargeTime: { v:0.6,  min:0.1, max:2,   step:0.1,  label:'最大タメまでの秒' },
  dashMult:   { v:1.9,  min:1.2, max:4,   step:0.1,  label:'ダッシュ倍率' },
  dashDur:    { v:0.5,  min:0.1, max:1.5, step:0.05, label:'ダッシュ持続（秒）' },
  knockPower: { v:18,   min:5,   max:45,  step:1,    label:'吹き飛びの強さ', star:true },
  knockUp:    { v:11,   min:0,   max:25,  step:1,    label:'吹き飛びの上向き' },
  enemySpeed: { v:5,    min:0,   max:14,  step:0.5,  label:'白血球の速さ' },
  mouseSens:  { v:1.0,  min:0.3, max:3,   step:0.1,  label:'マウス感度' },
};
const GOAL = 350;
const COURSE = 400;
const HALF_W = 8;
const SPIN_DUR = 0.45, SPIN_COOL = 0.7, SPIN_RADIUS = 4.5, DASH_COOL = 0.5;
const ENEMY_SENSE = 15;       // 白血球がオタマを感知して追尾する距離
const OTAMA_R = 0.9;          // オタマの当たり半径
const KNOCK_DUR = 0.7;        // 吹き飛び（操作不能）時間

// ============================================================
//  Three.js セットアップ
// ============================================================
const app = document.getElementById('app');
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x2a0618);
scene.fog = new THREE.FogExp2(0x2a0618, 0.015);

const camera = new THREE.PerspectiveCamera(62, innerWidth/innerHeight, 0.1, 700);

const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
app.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffd9e6, 0.75));
const dirLight = new THREE.DirectionalLight(0xffffff, 1.1);
dirLight.position.set(6, 14, -6);
scene.add(dirLight);

const tunMat = new THREE.MeshStandardMaterial({ color:0xd45a86, roughness:0.85, side:THREE.BackSide });
const tunnel = new THREE.Mesh(new THREE.CylinderGeometry(12, 12, COURSE+60, 30, 1, true), tunMat);
tunnel.rotation.x = Math.PI/2;
tunnel.position.set(0, 4, COURSE/2 - 20);
scene.add(tunnel);

const floorMat = new THREE.MeshStandardMaterial({ color:0xc24a78, roughness:0.95 });
const floor = new THREE.Mesh(new THREE.PlaneGeometry(54, COURSE+80), floorMat);
floor.rotation.x = -Math.PI/2;
floor.position.set(0, 0, COURSE/2 - 20);
scene.add(floor);

const ringMat = new THREE.MeshStandardMaterial({ color:0xff7eb0, emissive:0xff2e7e, emissiveIntensity:0.6, roughness:0.5 });
for (let z = 16; z < GOAL; z += 20) {
  const ring = new THREE.Mesh(new THREE.TorusGeometry(8.6, 0.2, 8, 32), ringMat);
  ring.position.set(0, 4, z);
  scene.add(ring);
}

const villiMat = new THREE.MeshStandardMaterial({ color:0xe0628c, roughness:0.9 });
let seed = 1234;
const rnd = () => { seed = (seed*9301 + 49297) % 233280; return seed/233280; };
for (let i = 0; i < 140; i++) {
  const a = rnd() * Math.PI * 2;
  const z = rnd() * (GOAL + 10);
  const len = 0.8 + rnd()*2.4;
  const v = new THREE.Mesh(new THREE.CapsuleGeometry(0.2, len, 4, 6), villiMat);
  v.position.set(Math.cos(a)*11, 4 + Math.sin(a)*11, z);
  v.lookAt(0, 4, z);
  scene.add(v);
}

const egg = new THREE.Mesh(
  new THREE.SphereGeometry(7, 32, 24),
  new THREE.MeshStandardMaterial({ color:0xffe07a, emissive:0xffb020, emissiveIntensity:0.7, roughness:0.4 })
);
egg.position.set(0, 5, GOAL + 10);
scene.add(egg);
const eggGlow = new THREE.PointLight(0xffd060, 2.6, 80);
eggGlow.position.copy(egg.position);
scene.add(eggGlow);

// ============================================================
//  障害物・敵
// ============================================================
const obstacles = [];   // {mesh, baseX, z, r, type, range, phase}
const enemies = [];     // {mesh, x0, z0, x, z, r, phase, hitT, kx, kz}

const pillarMat = new THREE.MeshStandardMaterial({ color:0xa83258, roughness:0.85 });
const swingMat  = new THREE.MeshStandardMaterial({ color:0xff5e8f, emissive:0xff2e6e, emissiveIntensity:0.35, roughness:0.6 });
const cellMat   = new THREE.MeshStandardMaterial({ color:0xf3ecff, emissive:0x9a86c4, emissiveIntensity:0.35, roughness:0.4, transparent:true, opacity:0.85 });

function addPillar(x, z) {
  const h = 6;
  const m = new THREE.Mesh(new THREE.CylinderGeometry(0.9, 1.15, h, 12), pillarMat);
  m.position.set(x, h/2, z);
  scene.add(m);
  obstacles.push({ mesh:m, baseX:x, z, r:1.5, type:'pillar' });
}
function addSwinger(z, range) {
  const m = new THREE.Mesh(new THREE.BoxGeometry(3.2, 5, 1.1), swingMat);
  m.position.set(0, 2.5, z);
  scene.add(m);
  obstacles.push({ mesh:m, baseX:0, z, r:2.1, type:'swinger', range, phase:rnd()*6.28 });
}
function addCell(x, z) {
  const m = new THREE.Mesh(new THREE.SphereGeometry(1.3, 18, 14), cellMat);
  const core = new THREE.Mesh(new THREE.SphereGeometry(0.6, 12, 10), new THREE.MeshStandardMaterial({ color:0xc9b4ee, emissive:0x6a4fa0, emissiveIntensity:0.5 }));
  m.add(core);
  scene.add(m);
  enemies.push({ mesh:m, x0:x, z0:z, x, z, r:1.5, phase:rnd()*6.28, hitT:0, kx:0, kz:0 });
}

// 手置き配置（固定シードで再現性）
seed = 777;
[40,68,68,96,124,124,152,184,216,216,250,288,288,322].forEach(z => addPillar((rnd()*2-1)*5.5, z));
[88,150,210,272,318].forEach((z,i) => addSwinger(z, 5 + i*0.3));
[120,165,205,255,300,335].forEach(z => addCell((rnd()*2-1)*5, z));

// ============================================================
//  オタマ
// ============================================================
const otama = new THREE.Group();
const headMat = new THREE.MeshStandardMaterial({ color:0xfff4e0, roughness:0.45, emissive:0x331a22, emissiveIntensity:0.25 });
const head = new THREE.Mesh(new THREE.SphereGeometry(0.85, 24, 18), headMat);
head.scale.set(0.9, 1.05, 1.0);
otama.add(head);

const whiteMat = new THREE.MeshStandardMaterial({ color:0xffffff, roughness:0.3 });
const blackMat = new THREE.MeshStandardMaterial({ color:0x111111, roughness:0.3 });
for (const sx of [-1, 1]) {
  const eye = new THREE.Mesh(new THREE.SphereGeometry(0.22, 12, 10), whiteMat);
  eye.position.set(0.32*sx, 0.28, 0.62);
  otama.add(eye);
  const pup = new THREE.Mesh(new THREE.SphereGeometry(0.11, 10, 8), blackMat);
  pup.position.set(0.34*sx, 0.27, 0.78);
  otama.add(pup);
}

const tailPivot = new THREE.Group();
tailPivot.position.set(0, 0, -0.7);
const tailMat = new THREE.MeshStandardMaterial({ color:0xffe9c0, roughness:0.5, transparent:true, opacity:0.92 });
const tail = new THREE.Mesh(new THREE.ConeGeometry(0.34, 2.4, 10), tailMat);
tail.rotation.x = -Math.PI/2;
tail.position.set(0, 0, -1.2);
tailPivot.add(tail);
otama.add(tailPivot);
scene.add(otama);

const spinRing = new THREE.Mesh(
  new THREE.TorusGeometry(1, 0.12, 8, 28),
  new THREE.MeshStandardMaterial({ color:0x9be7ff, emissive:0x39c5ff, emissiveIntensity:1.2, transparent:true, opacity:0 })
);
spinRing.rotation.x = Math.PI/2;
scene.add(spinRing);

// ============================================================
//  状態
// ============================================================
const S = {
  x:0, y:0, z:0, heading:0,
  pvx:0, pvz:0, bvx:0, bvz:0, vy:0,
  grounded:true, landWait:0,
  charging:false, chargeT:0,
  jumpedManual:false, canDouble:false,
  dashT:0, dashCool:0,
  spinT:0, spinCool:0, spinYaw:0,
  knockT:0, tumble:0,
  cleared:false, startT:0,
};
let camYaw = 0, camPitch = 0.22;
const keys = { w:false, a:false, s:false, d:false };

function reset() {
  S.x=0; S.y=0; S.z=0; S.heading=0;
  S.pvx=0; S.pvz=0; S.bvx=0; S.bvz=0; S.vy=0;
  S.grounded=true; S.landWait=0; S.charging=false; S.chargeT=0;
  S.jumpedManual=false; S.canDouble=false;
  S.dashT=0; S.dashCool=0; S.spinT=0; S.spinCool=0; S.spinYaw=0;
  S.knockT=0; S.tumble=0;
  S.cleared=false; S.startT=performance.now()/1000;
  camYaw = 0; camPitch = 0.22;
  for (const e of enemies) { e.x=e.x0; e.z=e.z0; e.hitT=0; e.kx=0; e.kz=0; }
  document.getElementById('banner').style.display='none';
  document.getElementById('charge').style.display='none';
}

// ============================================================
//  入力
// ============================================================
addEventListener('keydown', (e) => {
  if (e.repeat) { if (e.code==='Space') e.preventDefault(); return; }
  if (e.code==='KeyW' || e.code==='ArrowUp')    { keys.w = true; e.preventDefault(); }
  if (e.code==='KeyS' || e.code==='ArrowDown')  { keys.s = true; e.preventDefault(); }
  if (e.code==='KeyA' || e.code==='ArrowLeft')  keys.a = true;
  if (e.code==='KeyD' || e.code==='ArrowRight') keys.d = true;
  if (e.code==='KeyR') reset();
  if (e.code==='KeyH') togglePanel();

  if (e.code==='Space') {
    e.preventDefault();
    if (S.cleared || S.charging || S.knockT > 0) return;
    if (!S.jumpedManual) { S.charging = true; S.chargeT = 0; }
    else if (S.canDouble) { S.vy = P.jumpVel.v * 0.9; S.canDouble = false; S.grounded = false; }
  }
  if (e.code==='ShiftLeft' || e.code==='ShiftRight') {
    if (S.dashCool <= 0 && S.dashT <= 0 && !S.cleared && S.knockT <= 0) { S.dashT = P.dashDur.v; S.dashCool = P.dashDur.v + DASH_COOL; }
  }
  if (e.code==='KeyE') {
    if (S.spinCool <= 0 && !S.cleared && S.knockT <= 0) { S.spinT = SPIN_DUR; S.spinCool = SPIN_DUR + SPIN_COOL; S.spinYaw = S.heading; }
  }
});
addEventListener('keyup', (e) => {
  if (e.code==='KeyW' || e.code==='ArrowUp')    keys.w = false;
  if (e.code==='KeyS' || e.code==='ArrowDown')  keys.s = false;
  if (e.code==='KeyA' || e.code==='ArrowLeft')  keys.a = false;
  if (e.code==='KeyD' || e.code==='ArrowRight') keys.d = false;
  if (e.code==='Space') {
    e.preventDefault();
    if (S.charging) {
      const c = Math.min(S.chargeT / P.chargeTime.v, 1);
      const mult = 1 + c * (P.chargeMax.v - 1);
      S.vy = P.jumpVel.v * mult;
      S.grounded = false; S.charging = false;
      S.jumpedManual = true; S.canDouble = true;
      document.getElementById('charge').style.display='none';
    }
  }
});

const canvasEl = renderer.domElement;
canvasEl.addEventListener('click', () => { canvasEl.requestPointerLock(); });
document.addEventListener('mousemove', (e) => {
  if (document.pointerLockElement === canvasEl) {
    camYaw   -= e.movementX * P.mouseSens.v * 0.0022;
    camPitch  = THREE.MathUtils.clamp(camPitch + e.movementY * P.mouseSens.v * 0.0022, -0.15, 0.95);
  }
});
document.addEventListener('pointerlockchange', () => {
  document.getElementById('lockhint').style.display =
    (document.pointerLockElement === canvasEl) ? 'none' : 'flex';
});

// ============================================================
//  更新
// ============================================================
function lerpAngle(a, target, t) {
  let d = ((target - a + Math.PI) % (2*Math.PI)) - Math.PI;
  if (d < -Math.PI) d += 2*Math.PI;
  return a + d * t;
}
function knockback(dx, dz) {
  const d = Math.hypot(dx, dz) || 1;
  S.pvx = (dx/d) * P.knockPower.v;     // 当たった逆方向（障害物→オタマ）へ吹き飛ぶ
  S.pvz = (dz/d) * P.knockPower.v;
  S.bvx = 0; S.bvz = 0;
  S.vy = P.knockUp.v; S.grounded = false;
  S.knockT = KNOCK_DUR; S.tumble = 0;
  S.charging = false;
  document.getElementById('charge').style.display='none';
}

function update(dt) {
  if (S.cleared) return;
  const t = performance.now()/1000;
  const knocked = S.knockT > 0;
  if (knocked) S.knockT -= dt;

  if (S.dashT > 0) S.dashT -= dt;
  if (S.dashCool > 0) S.dashCool -= dt;

  if (knocked) {
    // 吹き飛び中：入力不能、慣性で飛んでいく
    S.pvx += (0 - S.pvx) * Math.min(1, dt*1.2);
    S.pvz += (0 - S.pvz) * Math.min(1, dt*1.2);
  } else {
    // カメラ基準の移動ベクトル（WASD）
    const cf = { x: Math.sin(camYaw), z: Math.cos(camYaw) };
    const cr = { x: Math.cos(camYaw), z: -Math.sin(camYaw) };
    let mx = ((keys.w?1:0) - (keys.s?1:0))*cf.x + ((keys.d?1:0) - (keys.a?1:0))*cr.x;
    let mz = ((keys.w?1:0) - (keys.s?1:0))*cf.z + ((keys.d?1:0) - (keys.a?1:0))*cr.z;
    const mlen = Math.hypot(mx, mz);
    if (mlen > 0.001) { mx/=mlen; mz/=mlen; }
    const maxV = P.fwdMax.v * (S.dashT > 0 ? P.dashMult.v : 1);
    const tvx = mlen > 0.001 ? mx*maxV : 0;
    const tvz = mlen > 0.001 ? mz*maxV : 0;
    S.pvx += (tvx - S.pvx) * Math.min(1, dt*5);
    S.pvz += (tvz - S.pvz) * Math.min(1, dt*5);
    if (mlen > 0.001) S.heading = lerpAngle(S.heading, Math.atan2(mx, mz), Math.min(1, dt*P.faceTurn.v));
  }
  const rx = Math.cos(S.heading), rz = -Math.sin(S.heading);

  // 左右ブレ減衰
  S.bvx += (0 - S.bvx) * Math.min(1, dt*3);
  S.bvz += (0 - S.bvz) * Math.min(1, dt*3);

  // 縦：タメ／重力／オート跳ね（吹き飛び中はオート跳ねしない）
  if (S.charging) {
    S.chargeT += dt;
    const c = Math.min(S.chargeT / P.chargeTime.v, 1);
    document.getElementById('charge').style.display='block';
    document.getElementById('chargeFill').style.width = (c*100)+'%';
    if (S.grounded) { S.y = 0; S.vy = 0; }
    else { S.vy -= P.gravity.v*dt; S.y += S.vy*dt; if (S.y<=0){S.y=0;S.vy=0;S.grounded=true;} }
  } else {
    if (!S.grounded) {
      S.vy -= P.gravity.v * dt;
      S.y += S.vy * dt;
      if (S.y <= 0) {
        S.y=0; S.vy=0; S.grounded=true; S.landWait=0; S.jumpedManual=false; S.canDouble=false;
        if (!knocked) {
          const R = (Math.random()*2 - 1) * P.sway.v;
          S.bvx += rx*R; S.bvz += rz*R;
        }
      }
    } else if (!knocked) {
      S.landWait += dt;
      if (S.landWait >= P.bounceWait.v) { S.vy = P.bounceVel.v; S.grounded = false; }
    }
  }

  // 位置更新
  S.x += (S.pvx + S.bvx) * dt;
  S.z += (S.pvz + S.bvz) * dt;
  if (S.x >  HALF_W) { S.x =  HALF_W; S.pvx *= -0.3; S.bvx *= -0.3; }
  if (S.x < -HALF_W) { S.x = -HALF_W; S.pvx *= -0.3; S.bvx *= -0.3; }
  if (S.z < -6) { S.z = -6; S.pvz = 0; }

  // 振り子の動き
  for (const o of obstacles) {
    if (o.type === 'swinger') o.mesh.position.x = Math.sin(t*1.2 + o.phase) * o.range;
  }

  // 敵（白血球）：追尾／弾かれて後退
  for (const e of enemies) {
    if (e.hitT > 0) {
      e.hitT -= dt;
      e.x += e.kx * dt; e.z += e.kz * dt;
      e.kx *= (1 - Math.min(1, dt*2)); e.kz *= (1 - Math.min(1, dt*2));
    } else {
      const dx = S.x - e.x, dz = S.z - e.z;
      const d = Math.hypot(dx, dz);
      if (d < ENEMY_SENSE && d > 0.1) {
        e.x += (dx/d) * P.enemySpeed.v * dt;
        e.z += (dz/d) * P.enemySpeed.v * dt;
      }
    }
    e.x = THREE.MathUtils.clamp(e.x, -HALF_W-1, HALF_W+1);
    e.mesh.position.set(e.x, 1.3 + Math.sin(t*3 + e.phase)*0.18, e.z);
    e.mesh.material.opacity = e.hitT > 0 ? 0.5 : 0.85;
  }

  // 回転攻撃で白血球を弾く（自分は無敵）
  if (S.spinT > 0) {
    for (const e of enemies) {
      if (e.hitT > 0) continue;
      const dx = e.x - S.x, dz = e.z - S.z;
      const d = Math.hypot(dx, dz);
      if (d < SPIN_RADIUS + e.r) {
        const nx = dx/(d||1), nz = dz/(d||1);
        e.kx = nx * 22; e.kz = nz * 22; e.hitT = 1.3;
      }
    }
  }

  // 当たり判定（吹き飛び中・回転中・高くジャンプ中は無効）
  if (S.knockT <= 0 && S.spinT <= 0 && S.y < 2.5) {
    for (const o of obstacles) {
      const ox = o.type === 'swinger' ? o.mesh.position.x : o.baseX;
      const dx = S.x - ox, dz = S.z - o.z;
      if (Math.hypot(dx, dz) < o.r + OTAMA_R) { knockback(dx, dz); break; }
    }
    if (S.knockT <= 0) {
      for (const e of enemies) {
        if (e.hitT > 0) continue;
        const dx = S.x - e.x, dz = S.z - e.z;
        if (Math.hypot(dx, dz) < e.r + OTAMA_R) { knockback(dx, dz); break; }
      }
    }
  }

  // 見た目
  otama.position.set(S.x, S.y, S.z);
  const stretch = THREE.MathUtils.clamp(1 + S.vy*0.02, 0.75, 1.35);
  head.scale.set(0.9/Math.sqrt(stretch), 1.05*stretch, 1.0/Math.sqrt(stretch));
  tailPivot.rotation.y = Math.sin(t * (8 + Math.abs(S.vy))) * 0.6;

  if (S.spinCool > 0) S.spinCool -= dt;
  if (S.spinT > 0) {
    S.spinT -= dt;
    S.spinYaw += dt * 28;
    otama.rotation.set(0, S.spinYaw, 0);
    const prog = 1 - Math.max(S.spinT, 0) / SPIN_DUR;
    spinRing.material.opacity = (1 - prog) * 0.9;
    const r = 0.3 + prog * SPIN_RADIUS;
    spinRing.position.set(S.x, S.y + 0.2, S.z);
    spinRing.scale.set(r, r, r);
  } else if (knocked) {
    S.tumble += dt * 16;                                   // 吹き飛び中はくるくる
    otama.rotation.set(S.tumble, S.heading, S.tumble*0.6);
    spinRing.material.opacity = 0;
  } else {
    otama.rotation.set(THREE.MathUtils.clamp(-S.vy*0.02, -0.4, 0.4), S.heading, 0);
    spinRing.material.opacity = 0;
  }

  // カメラ（マウスのyaw/pitchでオービット。移動では回らない）
  const lookY = 2.5, dist = 12;
  const off = {
    x: -Math.sin(camYaw) * Math.cos(camPitch),
    y:  Math.sin(camPitch),
    z: -Math.cos(camYaw) * Math.cos(camPitch),
  };
  const tx = S.x + off.x*dist, ty = S.y + lookY + off.y*dist, tz = S.z + off.z*dist;
  camera.position.x += (tx - camera.position.x) * Math.min(1, dt*10);
  camera.position.y += (ty - camera.position.y) * Math.min(1, dt*10);
  camera.position.z += (tz - camera.position.z) * Math.min(1, dt*10);
  camera.lookAt(S.x, S.y + lookY, S.z);

  // ゴール
  if (S.z >= GOAL && !S.cleared) {
    S.cleared = true;
    document.getElementById('cleartime').textContent = (performance.now()/1000 - S.startT).toFixed(1);
    document.getElementById('banner').style.display='flex';
    document.getElementById('charge').style.display='none';
  }

  // HUD
  document.getElementById('dist').textContent = Math.max(0, Math.floor(S.z));
  document.getElementById('togo').textContent = Math.max(0, Math.ceil(GOAL - S.z));
  document.getElementById('spd').textContent = Math.hypot(S.pvx + S.bvx, S.pvz + S.bvz).toFixed(1);
  document.getElementById('knockLbl').style.display = knocked ? 'block' : 'none';
}

// ============================================================
//  ループ
// ============================================================
let last = performance.now()/1000;
reset();
camera.position.set(0, 6.5, -11);
function loop() {
  const now = performance.now()/1000;
  const dt = Math.min(now - last, 0.05);
  last = now;
  update(dt);
  egg.rotation.y += dt*0.4;
  renderer.render(scene, camera);
  requestAnimationFrame(loop);
}
loop();

addEventListener('resize', () => {
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// ============================================================
//  スライダーUI生成
// ============================================================
const slidersEl = document.getElementById('sliders');
for (const key in P) {
  const p = P[key];
  const row = document.createElement('div');
  row.className = 'row';
  const star = p.star ? ' <span class="star">★最重要</span>' : '';
  row.innerHTML =
    `<label><span>${p.label}${star}</span><span class="val" id="val_${key}">${p.v}</span></label>` +
    `<input type="range" min="${p.min}" max="${p.max}" step="${p.step}" value="${p.v}" id="sl_${key}">`;
  slidersEl.appendChild(row);
  row.querySelector('input').addEventListener('input', (e) => {
    p.v = parseFloat(e.target.value);
    document.getElementById('val_'+key).textContent = p.v;
  });
}

let panelHidden = false;
function togglePanel() {
  panelHidden = !panelHidden;
  document.getElementById('panel').style.display = panelHidden ? 'none' : 'block';
}
document.getElementById('resetBtn').addEventListener('click', reset);
document.getElementById('againBtn').addEventListener('click', reset);
document.getElementById('hideBtn').addEventListener('click', togglePanel);
</script>
</body>
