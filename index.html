<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex, nofollow" />
<title>オタマレース ― 手触りデモ v2（回頭モデル）</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:100%; height:100%; overflow:hidden; background:#15030f; font-family: system-ui, -apple-system, sans-serif; }
  #app { position:fixed; inset:0; }
  canvas { display:block; }

  #panel {
    position:fixed; top:12px; left:12px; z-index:10;
    width:286px; max-height:calc(100% - 24px); overflow-y:auto;
    background:rgba(22,5,17,0.84); backdrop-filter:blur(8px);
    border:1px solid rgba(255,150,190,0.25); border-radius:14px;
    padding:14px 14px 16px; color:#ffd9e6; font-size:12px;
  }
  #panel h1 { font-size:13px; letter-spacing:.03em; margin-bottom:4px; color:#ff9ec4; }
  #panel .sub { font-size:10.5px; color:#c98aa6; margin-bottom:10px; line-height:1.55; }
  .row { margin:8px 0; }
  .row label { display:flex; justify-content:space-between; margin-bottom:3px; color:#ffc2d8; }
  .row label .val { color:#fff; font-variant-numeric:tabular-nums; }
  .row input[type=range]{ width:100%; accent-color:#ff5e9a; height:16px; }
  .star { color:#ffd54a; }
  .btns { display:flex; gap:8px; margin-top:12px; }
  .btns button {
    flex:1; padding:7px; border:none; border-radius:9px; cursor:pointer;
    background:#ff4f93; color:#fff; font-weight:600; font-size:12px;
  }
  .btns button.sec { background:rgba(255,255,255,0.12); color:#ffd9e6; }

  #hud {
    position:fixed; top:12px; right:12px; z-index:10; text-align:right;
    color:#ffe3ee; font-size:12px; text-shadow:0 1px 4px #000; pointer-events:none;
  }
  #hud .big { font-size:24px; font-weight:800; color:#fff; line-height:1.1; }
  #hud .lab { font-size:10px; color:#e9a9c4; letter-spacing:.08em; }

  #help {
    position:fixed; bottom:12px; left:50%; transform:translateX(-50%); z-index:10;
    color:#ffd9e6; font-size:12px; background:rgba(22,5,17,0.72);
    padding:7px 16px; border-radius:20px; text-shadow:0 1px 2px #000; white-space:nowrap;
  }
  #help b{ color:#ff9ec4; }

  #charge {
    position:fixed; bottom:52px; left:50%; transform:translateX(-50%); z-index:10;
    width:160px; height:8px; border-radius:5px; background:rgba(255,255,255,0.15);
    overflow:hidden; display:none;
  }
  #charge > div { height:100%; width:0%; background:linear-gradient(90deg,#ffd54a,#ff4f93); }

  #banner {
    position:fixed; inset:0; z-index:20; display:none;
    align-items:center; justify-content:center; flex-direction:column;
    background:rgba(15,3,11,0.55); color:#fff; text-align:center;
  }
  #banner .t { font-size:46px; font-weight:800; color:#ffd54a; text-shadow:0 2px 24px #ff5e9a; }
  #banner .s { margin-top:8px; font-size:15px; color:#ffd9e6; }
  #banner button{ margin-top:20px; padding:10px 28px; border:none; border-radius:11px; cursor:pointer; background:#ff4f93; color:#fff; font-weight:700; font-size:14px; }
</style>
</head>
<body>
<div id="app"></div>

<div id="panel">
  <h1>オタマ手触りデモ v2（回頭モデル）</h1>
  <div class="sub">真上にぴょんぴょん＋着地で左右ブレ。↑/Wで前進、←→で回頭。フォールガイズ型。手触りを数値で詰める。</div>
  <div id="sliders"></div>
  <div class="btns">
    <button id="resetBtn">リセット (R)</button>
    <button class="sec" id="hideBtn">隠す (H)</button>
  </div>
</div>

<div id="hud">
  <div class="lab">しんこう</div>
  <div class="big"><span id="dist">0</span><span style="font-size:13px"> m</span></div>
  <div class="lab" style="margin-top:6px">ゴールまで <span id="togo">0</span> m</div>
  <div class="lab">そくど <span id="spd">0.0</span></div>
</div>

<div id="help">操作: <b>↑ / W</b> 前進 ／ <b>← →</b> 回頭 ／ <b>Space</b> ジャンプ（長押しタメ・空中2段） ／ <b>Shift</b> ダッシュ ／ <b>E</b> 回転攻撃 ／ <b>R</b> リセット</div>
<div id="charge"><div id="chargeFill"></div></div>

<div id="banner">
  <div class="t">受精成功</div>
  <div class="s"><span id="cleartime">0.0</span> 秒でゴール</div>
  <button id="againBtn">もう一回 (R)</button>
</div>

<script type="importmap">
{ "imports": { "three": "./three.module.js" } }
</script>
<script type="module">
import * as THREE from 'three';

// ============================================================
//  パラメータ（手触りの沼。全部スライダーで生調整できる）
// ============================================================
const P = {
  gravity:    { v:30,   min:5,   max:60,  step:1,    label:'重力' },
  bounceVel:  { v:8,    min:3,   max:20,  step:0.5,  label:'オート跳ねの高さ（真上）' },
  bounceWait: { v:0.04, min:0,   max:0.5, step:0.01, label:'跳ね間隔（着地後のタメ）' },
  fwdMax:     { v:11,   min:3,   max:30,  step:0.5,  label:'前進スピード', star:true },
  turnSpeed:  { v:160,  min:60,  max:400, step:10,   label:'旋回速度（度/秒）', star:true },
  sway:       { v:3.5,  min:0,   max:12,  step:0.2,  label:'着地の左右ブレ', star:true },
  jumpVel:    { v:15,   min:6,   max:30,  step:0.5,  label:'ジャンプの高さ（真上）' },
  chargeMax:  { v:2.2,  min:1,   max:4,   step:0.1,  label:'最大タメ倍率' },
  chargeTime: { v:0.6,  min:0.1, max:2,   step:0.1,  label:'最大タメまでの秒' },
  dashMult:   { v:1.9,  min:1.2, max:4,   step:0.1,  label:'ダッシュ倍率' },
  dashDur:    { v:0.5,  min:0.1, max:1.5, step:0.05, label:'ダッシュ持続（秒）' },
};
const GOAL = 350;          // ゴール（卵子）のz
const COURSE = 400;        // トンネル全長
const HALF_W = 8;          // 通路の半幅（横の壁）
const SPIN_DUR = 0.45, SPIN_COOL = 0.7, SPIN_RADIUS = 4.5, DASH_COOL = 0.5;

// ============================================================
//  Three.js セットアップ
// ============================================================
const app = document.getElementById('app');
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x2a0618);
scene.fog = new THREE.FogExp2(0x2a0618, 0.015);

const camera = new THREE.PerspectiveCamera(62, innerWidth/innerHeight, 0.1, 700);
camera.position.set(0, 6.5, -11);

const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
app.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffd9e6, 0.75));
const dir = new THREE.DirectionalLight(0xffffff, 1.1);
dir.position.set(6, 14, -6);
scene.add(dir);

// --- 体内トンネル（円筒・内側）---
const tunMat = new THREE.MeshStandardMaterial({ color:0xd45a86, roughness:0.85, side:THREE.BackSide });
const tunnel = new THREE.Mesh(new THREE.CylinderGeometry(12, 12, COURSE+60, 30, 1, true), tunMat);
tunnel.rotation.x = Math.PI/2;
tunnel.position.set(0, 4, COURSE/2 - 20);
scene.add(tunnel);

// --- 床 ---
const floorMat = new THREE.MeshStandardMaterial({ color:0xc24a78, roughness:0.95 });
const floor = new THREE.Mesh(new THREE.PlaneGeometry(54, COURSE+80), floorMat);
floor.rotation.x = -Math.PI/2;
floor.position.set(0, 0, COURSE/2 - 20);
scene.add(floor);

// --- 進行リング（スピード感）---
const ringMat = new THREE.MeshStandardMaterial({ color:0xff7eb0, emissive:0xff2e7e, emissiveIntensity:0.6, roughness:0.5 });
for (let z = 16; z < GOAL; z += 20) {
  const ring = new THREE.Mesh(new THREE.TorusGeometry(8.6, 0.2, 8, 32), ringMat);
  ring.position.set(0, 4, z);
  scene.add(ring);
}

// --- 絨毛（雑な体内装飾・当たり判定なし）---
const villiMat = new THREE.MeshStandardMaterial({ color:0xe0628c, roughness:0.9 });
let seed = 1234;
const rnd = () => { seed = (seed*9301 + 49297) % 233280; return seed/233280; };
for (let i = 0; i < 140; i++) {
  const a = rnd() * Math.PI * 2;
  const z = rnd() * (GOAL + 10);
  const len = 0.8 + rnd()*2.4;
  const v = new THREE.Mesh(new THREE.CapsuleGeometry(0.2, len, 4, 6), villiMat);
  v.position.set(Math.cos(a)*11, 4 + Math.sin(a)*11, z);
  v.lookAt(0, 4, z);
  scene.add(v);
}

// --- 卵子（ゴール）---
const egg = new THREE.Mesh(
  new THREE.SphereGeometry(7, 32, 24),
  new THREE.MeshStandardMaterial({ color:0xffe07a, emissive:0xffb020, emissiveIntensity:0.7, roughness:0.4 })
);
egg.position.set(0, 5, GOAL + 10);
scene.add(egg);
const eggGlow = new THREE.PointLight(0xffd060, 2.6, 80);
eggGlow.position.copy(egg.position);
scene.add(eggGlow);

// ============================================================
//  オタマ（プリミティブの組み合わせ・粒度は雑）
// ============================================================
const otama = new THREE.Group();
const headMat = new THREE.MeshStandardMaterial({ color:0xfff4e0, roughness:0.45, emissive:0x331a22, emissiveIntensity:0.25 });
const head = new THREE.Mesh(new THREE.SphereGeometry(0.85, 24, 18), headMat);
head.scale.set(0.9, 1.05, 1.0);
otama.add(head);

const whiteMat = new THREE.MeshStandardMaterial({ color:0xffffff, roughness:0.3 });
const blackMat = new THREE.MeshStandardMaterial({ color:0x111111, roughness:0.3 });
for (const sx of [-1, 1]) {
  const eye = new THREE.Mesh(new THREE.SphereGeometry(0.22, 12, 10), whiteMat);
  eye.position.set(0.32*sx, 0.28, 0.62);
  otama.add(eye);
  const pup = new THREE.Mesh(new THREE.SphereGeometry(0.11, 10, 8), blackMat);
  pup.position.set(0.34*sx, 0.27, 0.78);
  otama.add(pup);
}

// しっぽ（後方・くねらせる。+z=顔の向きなので尾は-z）
const tailPivot = new THREE.Group();
tailPivot.position.set(0, 0, -0.7);
const tailMat = new THREE.MeshStandardMaterial({ color:0xffe9c0, roughness:0.5, transparent:true, opacity:0.92 });
const tail = new THREE.Mesh(new THREE.ConeGeometry(0.34, 2.4, 10), tailMat);
tail.rotation.x = -Math.PI/2;
tail.position.set(0, 0, -1.2);
tailPivot.add(tail);
otama.add(tailPivot);
scene.add(otama);

// 回転攻撃の輪エフェクト（今は見た目のみ。将来の対人妨害／障害排除の判定をここに乗せる）
const spinRing = new THREE.Mesh(
  new THREE.TorusGeometry(1, 0.12, 8, 28),
  new THREE.MeshStandardMaterial({ color:0x9be7ff, emissive:0x39c5ff, emissiveIntensity:1.2, transparent:true, opacity:0 })
);
spinRing.rotation.x = Math.PI/2;
scene.add(spinRing);   // ワールドに置く（オタマのスピン回転に巻き込まれないよう独立）

// ============================================================
//  状態（回頭モデル）
// ============================================================
const S = {
  x:0, y:0, z:0, heading:0,   // heading=向き(ラジアン)。0で+z方向
  pvx:0, pvz:0,               // 前進速度（向き依存）
  bvx:0, bvz:0,               // 着地の左右ブレ速度
  vy:0,
  grounded:true, landWait:0,
  charging:false, chargeT:0,
  jumpedManual:false, canDouble:false,
  dashT:0, dashCool:0,
  spinT:0, spinCool:0, spinYaw:0,
  bank:0,
  cleared:false, startT:0,
};
const keys = { left:false, right:false, fwd:false };

function reset() {
  S.x=0; S.y=0; S.z=0; S.heading=0;
  S.pvx=0; S.pvz=0; S.bvx=0; S.bvz=0; S.vy=0;
  S.grounded=true; S.landWait=0; S.charging=false; S.chargeT=0;
  S.jumpedManual=false; S.canDouble=false;
  S.dashT=0; S.dashCool=0; S.spinT=0; S.spinCool=0; S.spinYaw=0;
  S.bank=0; S.cleared=false; S.startT=performance.now()/1000;
  camera.position.set(0, 6.5, -11);
  document.getElementById('banner').style.display='none';
  document.getElementById('charge').style.display='none';
}

// ============================================================
//  入力
// ============================================================
addEventListener('keydown', (e) => {
  if (e.repeat) { if (e.code==='Space') e.preventDefault(); return; }
  if (e.code==='ArrowLeft' || e.code==='KeyA') keys.left = true;
  if (e.code==='ArrowRight'|| e.code==='KeyD') keys.right = true;
  if (e.code==='ArrowUp'   || e.code==='KeyW') { keys.fwd = true; e.preventDefault(); }
  if (e.code==='KeyR') reset();
  if (e.code==='KeyH') togglePanel();

  if (e.code==='Space') {
    e.preventDefault();
    if (S.cleared || S.charging) return;
    if (!S.jumpedManual) {
      S.charging = true; S.chargeT = 0;             // 1段目：タメ開始
    } else if (S.canDouble) {
      S.vy = P.jumpVel.v * 0.9;                       // 2段ジャンプ（真上。前進は維持）
      S.canDouble = false; S.grounded = false;
    }
  }

  if (e.code==='ShiftLeft' || e.code==='ShiftRight') {
    if (S.dashCool <= 0 && S.dashT <= 0 && !S.cleared) {
      S.dashT = P.dashDur.v; S.dashCool = P.dashDur.v + DASH_COOL;
    }
  }

  if (e.code==='KeyE') {
    if (S.spinCool <= 0 && !S.cleared) { S.spinT = SPIN_DUR; S.spinCool = SPIN_DUR + SPIN_COOL; S.spinYaw = S.heading; }
  }
});
addEventListener('keyup', (e) => {
  if (e.code==='ArrowLeft' || e.code==='KeyA') keys.left = false;
  if (e.code==='ArrowRight'|| e.code==='KeyD') keys.right = false;
  if (e.code==='ArrowUp'   || e.code==='KeyW') keys.fwd = false;
  if (e.code==='Space') {
    e.preventDefault();
    if (S.charging) {
      const c = Math.min(S.chargeT / P.chargeTime.v, 1);
      const mult = 1 + c * (P.chargeMax.v - 1);
      S.vy = P.jumpVel.v * mult;        // 真上のみ。前進(pvx,pvz)は維持→前進中なら前に飛ぶ
      S.grounded = false; S.charging = false;
      S.jumpedManual = true; S.canDouble = true;
      document.getElementById('charge').style.display='none';
    }
  }
});

// ============================================================
//  更新
// ============================================================
function update(dt) {
  if (S.cleared) return;

  // --- 旋回（左右入力＝その場で回頭）---
  const turn = (keys.right?1:0) - (keys.left?1:0);   // D/→で右回り
  S.heading += turn * (P.turnSpeed.v * Math.PI/180) * dt;
  const fx = Math.sin(S.heading), fz = Math.cos(S.heading);   // 前方ベクトル
  const rx = Math.cos(S.heading), rz = -Math.sin(S.heading);  // 右方ベクトル

  // --- ダッシュ ---
  if (S.dashT > 0) S.dashT -= dt;
  if (S.dashCool > 0) S.dashCool -= dt;

  // --- 前進（前進ボタン押下中、向いてる方向へ）---
  const maxV = P.fwdMax.v * (S.dashT > 0 ? P.dashMult.v : 1);
  const tvx = keys.fwd ? fx*maxV : 0;
  const tvz = keys.fwd ? fz*maxV : 0;
  S.pvx += (tvx - S.pvx) * Math.min(1, dt*5);
  S.pvz += (tvz - S.pvz) * Math.min(1, dt*5);

  // --- 左右ブレは時間で減衰（跳ねるたびに足される）---
  S.bvx += (0 - S.bvx) * Math.min(1, dt*3);
  S.bvz += (0 - S.bvz) * Math.min(1, dt*3);

  // --- 縦：タメ／重力／オート跳ね ---
  if (S.charging) {
    S.chargeT += dt;
    const c = Math.min(S.chargeT / P.chargeTime.v, 1);
    document.getElementById('charge').style.display='block';
    document.getElementById('chargeFill').style.width = (c*100)+'%';
    if (S.grounded) { S.y = 0; S.vy = 0; }
    else { S.vy -= P.gravity.v*dt; S.y += S.vy*dt; if (S.y<=0){S.y=0;S.vy=0;S.grounded=true;} }
  } else {
    if (!S.grounded) {
      S.vy -= P.gravity.v * dt;
      S.y += S.vy * dt;
      if (S.y <= 0) {
        S.y=0; S.vy=0; S.grounded=true; S.landWait=0; S.jumpedManual=false; S.canDouble=false;
        const R = (Math.random()*2 - 1) * P.sway.v;   // ★着地で左右にちょいズレ
        S.bvx += rx*R; S.bvz += rz*R;
      }
    } else {
      S.landWait += dt;
      if (S.landWait >= P.bounceWait.v) { S.vy = P.bounceVel.v; S.grounded = false; }   // 真上に跳ねる
    }
  }

  // --- 位置更新（前進＋ブレの合成）---
  S.x += (S.pvx + S.bvx) * dt;
  S.z += (S.pvz + S.bvz) * dt;

  // --- 壁／前後の限界 ---
  if (S.x >  HALF_W) { S.x =  HALF_W; S.pvx *= -0.3; S.bvx *= -0.3; }
  if (S.x < -HALF_W) { S.x = -HALF_W; S.pvx *= -0.3; S.bvx *= -0.3; }
  if (S.z < -6) { S.z = -6; S.pvz = 0; }

  // --- 見た目に反映 ---
  otama.position.set(S.x, S.y, S.z);
  const stretch = THREE.MathUtils.clamp(1 + S.vy*0.02, 0.75, 1.35);
  head.scale.set(0.9/Math.sqrt(stretch), 1.05*stretch, 1.0/Math.sqrt(stretch));
  // 旋回でバンク（傾く）
  S.bank += ((-turn*0.3) - S.bank) * Math.min(1, dt*6);
  // しっぽを振る
  const t = performance.now()/1000;
  tailPivot.rotation.y = Math.sin(t * (8 + Math.abs(S.vy))) * 0.6;

  // --- 回転攻撃の演出 ---
  if (S.spinCool > 0) S.spinCool -= dt;
  if (S.spinT > 0) {
    S.spinT -= dt;
    S.spinYaw += dt * 28;
    otama.rotation.set(0, S.spinYaw, 0);             // スピン中は向き無視で回る
    const prog = 1 - Math.max(S.spinT, 0) / SPIN_DUR;
    spinRing.material.opacity = (1 - prog) * 0.9;
    const r = 0.3 + prog * SPIN_RADIUS;
    spinRing.position.set(S.x, S.y + 0.2, S.z);
    spinRing.scale.set(r, r, r);
  } else {
    otama.rotation.set(
      THREE.MathUtils.clamp(-S.vy*0.02, -0.4, 0.4),   // ピッチ（跳ね）
      S.heading,                                       // 顔の向き
      S.bank                                           // バンク
    );
    spinRing.material.opacity = 0;
  }

  // --- カメラ：オタマの背後に追従（向いてる方が画面奥）---
  const camDist = 11, camH = 6.5;
  camera.position.x += ((S.x - fx*camDist) - camera.position.x) * Math.min(1, dt*4);
  camera.position.y += ((camH)            - camera.position.y) * Math.min(1, dt*4);
  camera.position.z += ((S.z - fz*camDist) - camera.position.z) * Math.min(1, dt*4);
  camera.lookAt(S.x + fx*6, 3, S.z + fz*6);

  // --- ゴール判定 ---
  if (S.z >= GOAL && !S.cleared) {
    S.cleared = true;
    document.getElementById('cleartime').textContent = (performance.now()/1000 - S.startT).toFixed(1);
    document.getElementById('banner').style.display='flex';
    document.getElementById('charge').style.display='none';
  }

  // --- HUD ---
  const spd = Math.hypot(S.pvx + S.bvx, S.pvz + S.bvz);
  document.getElementById('dist').textContent = Math.max(0, Math.floor(S.z));
  document.getElementById('togo').textContent = Math.max(0, Math.ceil(GOAL - S.z));
  document.getElementById('spd').textContent = spd.toFixed(1);
}

// ============================================================
//  ループ
// ============================================================
let last = performance.now()/1000;
reset();
function loop() {
  const now = performance.now()/1000;
  const dt = Math.min(now - last, 0.05);
  last = now;
  update(dt);
  egg.rotation.y += dt*0.4;
  renderer.render(scene, camera);
  requestAnimationFrame(loop);
}
loop();

addEventListener('resize', () => {
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// ============================================================
//  スライダーUI生成
// ============================================================
const slidersEl = document.getElementById('sliders');
for (const key in P) {
  const p = P[key];
  const row = document.createElement('div');
  row.className = 'row';
  const star = p.star ? ' <span class="star">★最重要</span>' : '';
  row.innerHTML =
    `<label><span>${p.label}${star}</span><span class="val" id="val_${key}">${p.v}</span></label>` +
    `<input type="range" min="${p.min}" max="${p.max}" step="${p.step}" value="${p.v}" id="sl_${key}">`;
  slidersEl.appendChild(row);
  row.querySelector('input').addEventListener('input', (e) => {
    p.v = parseFloat(e.target.value);
    document.getElementById('val_'+key).textContent = p.v;
  });
}

let panelHidden = false;
function togglePanel() {
  panelHidden = !panelHidden;
  document.getElementById('panel').style.display = panelHidden ? 'none' : 'block';
}
document.getElementById('resetBtn').addEventListener('click', reset);
document.getElementById('againBtn').addEventListener('click', reset);
document.getElementById('hideBtn').addEventListener('click', togglePanel);
</script>
</body>
